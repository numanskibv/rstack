services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    environment:
      APP_ENV: production
      APP_PORT: "${APP_PORT}"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M

networks:
  app-network:
    driver: bridge
