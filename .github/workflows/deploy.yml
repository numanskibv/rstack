name: Deploy to NUC

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to NUC (self-hosted)
    runs-on: self-hosted

    env:
      APP_PATH: /var/www/rstack

    steps:
      - name: Pull latest code
        run: git -C ${{ env.APP_PATH }} pull origin main

      - name: Build & start containers
        working-directory: ${{ env.APP_PATH }}
        run: docker compose up -d --build

      - name: Run database migrations
        working-directory: ${{ env.APP_PATH }}
        run: docker compose exec -T app php artisan migrate --force

      - name: Cache config, routes & views
        working-directory: ${{ env.APP_PATH }}
        run: |
          docker compose exec -T app php artisan config:cache
          docker compose exec -T app php artisan route:cache
          docker compose exec -T app php artisan view:cache

      - name: Restart queue worker
        working-directory: ${{ env.APP_PATH }}
        run: docker compose exec -T app php artisan queue:restart
        continue-on-error: true

        continue-on-error: true
